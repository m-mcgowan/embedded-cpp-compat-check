name: Arduino Uno R4 Minima
slug: uno-r4-minima
version: "1.1.0"
architecture: arm-cortex-m4
mcu: ra4m1
board_family: Renesas RA4M1
build_system: platformio
framework: arduino

platformio:
  platform: renesas-ra
  board: uno_r4_minima
  framework: arduino

standards: [c++11, c++14, c++17, c++20]

recipe:
  description: "Add nonstd-lite-bundle for C++17 vocabulary types at C++11/14"
  lib_deps:
    - https://github.com/m-mcgowan/nonstd-lite-bundle.git

release_monitor:
  type: platformio_registry
  platform: renesas-ra
