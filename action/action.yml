name: Embedded C++ Compatibility Check
description: Test a PlatformIO library across embedded platforms and C++ standards
branding:
  icon: cpu
  color: blue

inputs:
  library:
    description: "Path to the library directory (default: current directory)"
    required: false
    default: '.'
  platforms:
    description: "Space-separated platform slugs to test (default: auto-detected from library.json platforms field)"
    required: false
    default: ''
  report:
    description: Path to write the compatibility report
    required: false
    default: 'compatibility.md'
  report-format:
    description: Report format (md or json, auto-detected from report extension if omitted)
    required: false
    default: ''
  readme:
    description: |
      README integration mode:
        none   - just generate the report (default)
        update - inject report between <!-- compat-matrix-start/end --> markers in README.md
        verify - fail if README markers would change (for CI gate)
    required: false
    default: 'none'
  readme-path:
    description: Path to README file (for readme=update or readme=verify)
    required: false
    default: 'README.md'
  setup-python:
    description: Set up Python if not already available (set to 'false' if your workflow already configures Python)
    required: false
    default: 'true'
  setup-platformio:
    description: Install PlatformIO if not already available (set to 'false' if your workflow already installs it)
    required: false
    default: 'true'
  python-version:
    description: Python version to use (only applies when setup-python is true)
    required: false
    default: '3.12'

outputs:
  report-path:
    description: Path to the generated report file
    value: ${{ inputs.report }}

runs:
  using: composite
  steps:
    - name: Set up Python
      if: inputs.setup-python == 'true'
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install PlatformIO
      if: inputs.setup-platformio == 'true'
      shell: bash
      run: pip install platformio

    - name: Install compat-check
      shell: bash
      run: pip install "git+https://github.com/m-mcgowan/embedded-cpp-compat-check.git@${{ github.action_ref || 'main' }}"

    - name: Run compatibility check
      shell: bash
      run: |
        ARGS="--report ${{ inputs.report }}"

        if [ -n "${{ inputs.report-format }}" ]; then
          ARGS="$ARGS --report-format ${{ inputs.report-format }}"
        fi

        if [ -n "${{ inputs.platforms }}" ]; then
          for plat in ${{ inputs.platforms }}; do
            ARGS="$ARGS --platform $plat"
          done
        fi

        compat-check library ${{ inputs.library }} $ARGS

    - name: Update README
      if: inputs.readme == 'update'
      shell: bash
      run: |
        python3 -c "
        import re, sys
        readme = open('${{ inputs.readme-path }}').read()
        report = open('${{ inputs.report }}').read()
        start = '<!-- compat-matrix-start -->'
        end = '<!-- compat-matrix-end -->'
        if start not in readme or end not in readme:
            print('::warning::README markers not found. Add <!-- compat-matrix-start --> and <!-- compat-matrix-end --> to your README.')
            sys.exit(0)
        updated = re.sub(
            f'{re.escape(start)}.*?{re.escape(end)}',
            f'{start}\n{report}\n{end}',
            readme, flags=re.DOTALL)
        open('${{ inputs.readme-path }}', 'w').write(updated)
        print('README updated with compatibility matrix.')
        "

    - name: Verify README
      if: inputs.readme == 'verify'
      shell: bash
      run: |
        python3 -c "
        import re, sys
        readme = open('${{ inputs.readme-path }}').read()
        report = open('${{ inputs.report }}').read()
        start = '<!-- compat-matrix-start -->'
        end = '<!-- compat-matrix-end -->'
        if start not in readme or end not in readme:
            print('::error::README is missing compatibility matrix markers.')
            print('Add <!-- compat-matrix-start --> and <!-- compat-matrix-end --> to your README.')
            sys.exit(1)
        current = re.search(f'{re.escape(start)}(.*?){re.escape(end)}', readme, re.DOTALL)
        current_text = current.group(1).strip() if current else ''
        fresh_text = report.strip()
        if current_text != fresh_text:
            print('::error::Compatibility matrix in README is outdated.')
            print('Run the compatibility check locally and update your README, or use readme=update in CI.')
            sys.exit(1)
        print('README compatibility matrix is up to date.')
        "
