name: ESP32-S3 (espressif32 official)
slug: esp32s3-espressif32
version: "55.3.37"
architecture: xtensa
mcu: esp32s3
board_family: esp32s3
build_system: platformio
framework: arduino

platformio:
  platform: espressif32
  board: esp32-s3-devkitm-1
  framework: arduino

standards: [c++11, c++14, c++17, c++20, c++23, c++26]

recipe:
  description: "Add nonstd-lite-bundle for C++17 vocabulary types at C++11/14"
  lib_deps:
    - https://github.com/m-mcgowan/nonstd-lite-bundle.git

release_monitor:
  type: platformio_registry
  platform: espressif32
