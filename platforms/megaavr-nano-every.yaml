name: megaAVR Arduino Nano Every
slug: megaavr-nano-every
version: "1.6.1"
architecture: megaavr
mcu: atmega4809
board_family: ATmega4809
build_system: platformio
framework: arduino

platformio:
  platform: atmelmegaavr
  board: nano_every
  framework: arduino

standards: [c++11, c++14, c++17]

recipe:
  description: "Add avr-libstdcpp for full C++ standard library support"
  lib_deps:
    - https://github.com/m-mcgowan/avr-libstdcpp.git#add-library-json

release_monitor:
  type: platformio_registry
  platform: atmelmegaavr
