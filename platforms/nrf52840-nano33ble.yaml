name: nRF52840 Arduino Nano 33 BLE
slug: nrf52840-nano33ble
version: "9.5.0"
architecture: arm-cortex-m4f
mcu: nrf52840
board_family: nRF52840 Cortex-M4F
build_system: platformio
framework: arduino

platformio:
  platform: nordicnrf52
  board: nano33ble
  framework: arduino

standards: [c++11, c++14, c++17, c++20]

recipe:
  description: "Add nonstd-lite-bundle for C++17 vocabulary types at C++11/14"
  lib_deps:
    - https://github.com/m-mcgowan/nonstd-lite-bundle.git

release_monitor:
  type: platformio_registry
  platform: nordicnrf52
