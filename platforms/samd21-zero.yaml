name: SAMD21 Arduino Zero
slug: samd21-zero
version: "8.1.0"
architecture: arm-cortex-m0plus
mcu: samd21g18a
build_system: platformio
framework: arduino

platformio:
  platform: atmelsam
  board: zeroUSB
  framework: arduino

standards: [c++11, c++14, c++17]

recipe:
  description: "Add nonstd-lite-bundle for C++17 vocabulary types at C++11/14"
  lib_deps:
    - https://github.com/m-mcgowan/nonstd-lite-bundle.git

release_monitor:
  type: platformio_registry
  platform: atmelsam
