name: ESP32-S3 (Arduino v3)
slug: esp32s3-arduino-v3
version: "55.03.36"
architecture: xtensa
mcu: esp32s3
build_system: platformio
framework: arduino

platformio:
  platform: https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36/platform-espressif32.zip
  board: esp32-s3-devkitm-1
  framework: arduino

standards: [c++11, c++14, c++17, c++20, c++23, c++26]

recipe:
  description: "Add nonstd-lite-bundle for C++17 vocabulary types at C++11/14"
  lib_deps:
    - https://github.com/m-mcgowan/nonstd-lite-bundle.git

release_monitor:
  type: github_release
  repo: pioarduino/platform-espressif32
