name: Build Compatibility Matrix

on:
  push:
    branches: [main]
    paths:
      - 'tests/**'
      - 'platforms/**'
      - 'catalog/**'
      - 'src/**'
      - 'pytests/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'tests/**'
      - 'platforms/**'
      - 'catalog/**'
      - 'src/**'
      - 'pytests/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform slug to test (blank = all)'
        required: false

jobs:
  test:
    name: Unit + Acceptance Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest pytests/ -v --ignore=pytests/acceptance

      - name: Install PlatformIO
        run: pip install platformio

      - name: Sync catalog (if needed)
        run: |
          if [ ! -f catalog/data.yaml ]; then
            compat-check sync
          fi

      - name: Run acceptance tests
        run: pytest pytests/acceptance/ -v --timeout=600

      - name: Smoke test sweep (single platform)
        run: compat-check run --platform stm32-nucleo-f411re

  sweep:
    name: Full Platform Sweep
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install platformio

      - name: Sync catalog (if needed)
        run: |
          if [ ! -f catalog/data.yaml ]; then
            compat-check sync
          fi

      - name: Run compatibility checks
        run: |
          PLATFORM_FLAG=""
          if [ -n "${{ github.event.inputs.platform }}" ]; then
            PLATFORM_FLAG="--platform ${{ github.event.inputs.platform }}"
          fi
          compat-check run $PLATFORM_FLAG --parallel=1

      - name: Generate site and README
        run: compat-check generate

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results/

      - name: Commit results and site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f results/ README.md site/
          git diff --staged --quiet || git commit -m "ci: update compatibility results"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
