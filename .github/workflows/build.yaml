name: Build Compatibility Matrix

on:
  push:
    branches: [main]
    paths:
      - 'tests/**'
      - 'platforms/**'
      - 'catalog/**'
      - 'src/**'
  pull_request:
    paths:
      - 'tests/**'
      - 'platforms/**'
      - 'catalog/**'
      - 'src/**'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform slug to test (blank = all)'
        required: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest pytests/ -v

      - name: Sync catalog (if needed)
        run: |
          if [ ! -f catalog/data.yaml ]; then
            compat-check sync
          fi

      - name: Install PlatformIO
        run: pip install platformio

      - name: Run compatibility checks
        run: |
          PLATFORM_FLAG=""
          if [ -n "${{ github.event.inputs.platform }}" ]; then
            PLATFORM_FLAG="--platform ${{ github.event.inputs.platform }}"
          fi
          compat-check run $PLATFORM_FLAG --parallel=1

      - name: Generate site and README
        run: compat-check generate

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results/

      - name: Commit results and site
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/ README.md
          git diff --staged --quiet || git commit -m "ci: update compatibility results"
          git push

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
